<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Blog</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Modal de Login Admin -->
    <div id="adminModal" class="admin-modal">
        <div class="admin-modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2><i class="fas fa-lock"></i> Área Admin</h2>
            <input type="password" id="adminPassword" placeholder="Digite a senha admin">
            <button id="loginBtn">Entrar</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>

    <!-- Header -->
    <header id="header">
        <div class="header-content">
            <h1 id="blogTitle">Meu Blog</h1>
            <button id="adminBtn" class="admin-btn">
                <i class="fas fa-cog"></i> Admin
            </button>
        </div>
    </header>

    <!-- Container Principal -->
    <main class="container">
        <!-- Editor Admin (escondido por padrão) -->
        <div id="adminPanel" class="admin-panel hidden">
            <div class="admin-header">
                <h2><i class="fas fa-edit"></i> Painel Admin</h2>
                <button id="logoutBtn" class="btn-secondary">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>

            <!-- Configurações do Blog -->
            <div class="admin-section">
                <h3><i class="fas fa-palette"></i> Configurações do Blog</h3>
                <div class="config-grid">
                    <div class="config-item">
                        <label>Título do Blog:</label>
                        <input type="text" id="blogTitleInput" placeholder="Meu Blog">
                    </div>
                    <div class="config-item">
                        <label>Cor Principal:</label>
                        <input type="color" id="primaryColor" value="#3498db">
                    </div>
                    <div class="config-item">
                        <label>Cor de Fundo:</label>
                        <input type="color" id="bgColor" value="#f8f9fa">
                    </div>
                </div>
                <button id="saveConfigBtn" class="btn-primary">
                    <i class="fas fa-save"></i> Salvar Configurações
                </button>
            </div>

            <!-- Criar Novo Post -->
            <div class="admin-section">
                <h3><i class="fas fa-plus"></i> Novo Post</h3>
                <textarea id="postContent" placeholder="Escreva seu post aqui... Suporta HTML, Markdown e formatação rica!"></textarea>
                
                <!-- Editor de Fotos -->
                <div class="photo-editor">
                    <h4><i class="fas fa-images"></i> Fotos (máx 10)</h4>
                    <div id="photoInputs" class="photo-inputs">
                        <input type="file" id="photo1" accept="image/*" multiple>
                    </div>
                    <button id="addPhotoBtn" class="btn-secondary">
                        <i class="fas fa-plus"></i> + Foto
                    </button>
                </div>
                
                <button id="publishBtn" class="btn-primary">
                    <i class="fas fa-paper-plane"></i> Publicar Post
                </button>
            </div>

            <!-- Lista de Posts -->
            <div class="admin-section">
                <h3><i class="fas fa-list"></i> Meus Posts</h3>
                <div id="postsList" class="posts-list"></div>
            </div>
        </div>

        <!-- Feed Público -->
        <div id="publicFeed" class="public-feed">
            <div id="postsFeed"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
